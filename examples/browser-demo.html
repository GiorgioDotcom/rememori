<!doctype html>
<!--
  rememori browser demo — fully local semantic memory.
  Embeddings run in your browser via transformers.js (WASM/WebGPU),
  storage is IndexedDB. Open DevTools > Network: after the model
  downloads once, nothing leaves your machine.

  Serve this file (any static server) and open it:
    npx serve examples
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>rememori — memory in your browser</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='-100 -100 200 200'%3E%3Cpath d='M0 -100 L22.45 -30.9 L95.11 -30.9 L36.33 11.8 L58.78 80.9 L0 38.2 L-58.78 80.9 L-36.33 11.8 L-95.11 -30.9 L-22.45 -30.9 Z' fill='%23159957'/%3E%3C/svg%3E" />
  <style>
    /* Verda Stelo — matches rememori.dev */
    :root {
      --bg: oklch(1 0 0);
      --ink: oklch(0.20 0.02 150);
      --muted: oklch(0.44 0.02 150);
      --line: oklch(0.885 0.012 150);
      --verda: oklch(0.55 0.16 150);
      --verda-deep: oklch(0.42 0.14 150);
      --verda-wash: oklch(0.95 0.025 150);
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      max-width: 640px; margin: 3rem auto; padding: 0 1rem;
      line-height: 1.6;
    }
    h1 {
      display: flex; align-items: center; gap: .45em;
      font-weight: 800; letter-spacing: -0.02em;
    }
    h1 svg { width: .9em; height: .9em; fill: var(--verda); }
    input, button { font: inherit; padding: .5rem .75rem; }
    input {
      width: 100%; box-sizing: border-box; margin-bottom: .5rem;
      color: var(--ink); background: var(--bg);
      border: 1px solid var(--line); border-radius: 8px;
    }
    input:focus { border-color: var(--verda); outline: none; box-shadow: 0 0 0 3px var(--verda-wash); }
    input::placeholder { color: oklch(0.52 0.015 150); }
    ol { padding-left: 1.2rem; }
    li { margin: .35rem 0; }
    .score { color: var(--verda-deep); font-family: var(--mono); font-size: .85em; }
    #status { color: var(--muted); font-family: var(--mono); font-size: .9em; }
    a { color: var(--verda-deep); }
  </style>
</head>
<body>
  <h1><svg viewBox="-100 -100 200 200" aria-hidden="true"><path d="M0 -100 L22.45 -30.9 L95.11 -30.9 L36.33 11.8 L58.78 80.9 L0 38.2 L-58.78 80.9 L-36.33 11.8 L-95.11 -30.9 L-22.45 -30.9 Z"/></svg>rememori</h1>
  <p>Semantic memory, 100% in your browser. No server. Check the Network tab. <a href="https://rememori.dev">rememori.dev</a></p>
  <p id="status">Loading embedding model (first visit downloads ~30 MB, then cached)…</p>

  <input id="remember" placeholder="Remember something… (Enter)" disabled />
  <input id="recall" placeholder="Ask your memory… (Enter)" disabled />
  <ol id="results"></ol>

  <script type="module">
    const status = document.getElementById('status');
    const rememberEl = document.getElementById('remember');
    const recallEl = document.getElementById('recall');
    const resultsEl = document.getElementById('results');

    let mem;
    try {
      const [{ pipeline }, { Memory }] = await Promise.all([
        import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/+esm'),
        // dist is dependency-free ESM, so the raw file works from any CDN
        import('https://cdn.jsdelivr.net/npm/rememori@0.3.0/dist/index.js'),
      ]);

      const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
        progress_callback: (p) => {
          if (p.status === 'progress' && p.file?.endsWith('.onnx')) {
            status.textContent = `Downloading model… ${Math.round(p.progress)}%`;
          }
        },
      });
      const embedder = {
        async embed(texts) {
          const out = await extractor(texts, { pooling: 'mean', normalize: true });
          return out.tolist().map((v) => new Float32Array(v));
        },
      };

      mem = await Memory.open('idb://demo', { embedder });
    } catch (err) {
      status.textContent = `Failed to load: ${err?.message ?? err}`;
      status.style.color = '#c00';
      throw err;
    }

    status.textContent = `Ready — ${mem.size} memories stored in IndexedDB.`;
    rememberEl.disabled = recallEl.disabled = false;

    rememberEl.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || !rememberEl.value.trim()) return;
      await mem.remember(rememberEl.value);
      status.textContent = `Remembered. ${mem.size} memories total.`;
      rememberEl.value = '';
    });

    recallEl.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || !recallEl.value.trim()) return;
      const hits = await mem.recall(recallEl.value, { limit: 5 });
      resultsEl.innerHTML = hits
        .map((h) => `<li>${h.text} <span class="score">${h.score.toFixed(3)}</span></li>`)
        .join('') || '<li><em>nothing relevant</em></li>';
    });
  </script>
</body>
</html>
