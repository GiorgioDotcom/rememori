<!doctype html>
<!--
  rememori browser demo — fully local semantic memory.
  Embeddings run in your browser via transformers.js (WASM/WebGPU),
  storage is IndexedDB. Open DevTools > Network: after the model
  downloads once, nothing leaves your machine.

  Serve this file (any static server) and open it:
    npx serve examples
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>rememori — memory in your browser</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; }
    input, button { font: inherit; padding: .5rem .75rem; }
    input { width: 100%; box-sizing: border-box; margin-bottom: .5rem; }
    li { margin: .35rem 0; }
    .score { color: #888; font-size: .85em; }
    #status { color: #888; }
  </style>
</head>
<body>
  <h1>rememori</h1>
  <p>Semantic memory, 100% in your browser. No server. Check the Network tab.</p>
  <p id="status">Loading embedding model (first visit downloads ~30 MB, then cached)…</p>

  <input id="remember" placeholder="Remember something… (Enter)" disabled />
  <input id="recall" placeholder="Ask your memory… (Enter)" disabled />
  <ol id="results"></ol>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/+esm';
    import { Memory } from 'https://esm.sh/rememori@0.3.0';

    const status = document.getElementById('status');
    const rememberEl = document.getElementById('remember');
    const recallEl = document.getElementById('recall');
    const resultsEl = document.getElementById('results');

    const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
    const embedder = {
      async embed(texts) {
        const out = await extractor(texts, { pooling: 'mean', normalize: true });
        return out.tolist().map((v) => new Float32Array(v));
      },
    };

    const mem = await Memory.open('idb://demo', { embedder });
    status.textContent = `Ready — ${mem.size} memories stored in IndexedDB.`;
    rememberEl.disabled = recallEl.disabled = false;

    rememberEl.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || !rememberEl.value.trim()) return;
      await mem.remember(rememberEl.value);
      status.textContent = `Remembered. ${mem.size} memories total.`;
      rememberEl.value = '';
    });

    recallEl.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || !recallEl.value.trim()) return;
      const hits = await mem.recall(recallEl.value, { limit: 5 });
      resultsEl.innerHTML = hits
        .map((h) => `<li>${h.text} <span class="score">${h.score.toFixed(3)}</span></li>`)
        .join('') || '<li><em>nothing relevant</em></li>';
    });
  </script>
</body>
</html>
